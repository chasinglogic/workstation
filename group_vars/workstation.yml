---
groups_to_create:
  - name: docker
  - name: wheel
  - name: sudo

users:
  - username: chasinglogic
    name: Mathew Robinson
    home: /home/chasinglogic
    update_password: on_create
    groups:
      - sudo
      - wheel
      - docker

zsh_users: "{{ users }}"

dconf_settings:
  - name: Set CAPSLOCK as Ctrl and Disable ALTGR on UK keyboards
    key: /org/gnome/desktop/input-sources/xkb-options
    value: "['ctrl:nocaps', 'lv3:ralt_alt']"

deb_package_specs: []
rpm_package_specs: []

deb_packages:
  - awscli
  - python3-dev
  - bind9-utils
  - iputils-ping
  - traceroute

rpm_packages:
  - awscli2
  - python3-devel
  - bind-utils
  - iputils

generic_package_specs: []

generic_packages:
  # Virtualization software
  - gnome-boxes
  - virt-manager
  - podman

  # You know what it is.
  - emacs
  # But it never hurts to have a backup.
  - vim
  - neovim

  # Stuff I wish was included by default on everything
  - gnome-calendar
  - gnome-weather
  - gnome-clocks

  # System monitor
  - htop

  # Introspection
  - strace
  - ltrace
  - valgrind

  # Misc tools
  - curl
  - indent
  - libtool
  - ripgrep
  - fd-find

  # Documentation
  - pandoc

  # Lint / Correctness
  - yamllint

  # Neovim / Tmux system clipboard support
  - xclip
  - wl-clipboard

  # PyPI upload tool
  - twine

  # Spell checker
  - aspell
  - aspell-en

  # Python
  - python3
  - python3-pip
  - python3-psutil
  - python3-requests
