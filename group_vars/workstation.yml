---
groups_to_create:
  - name: docker
  - name: wheel
  - name: sudo

users:
  - username: chasinglogic
    name: Mathew Robinson
    home: /home/chasinglogic
    update_password: on_create
    groups:
      - sudo
      - wheel
      - docker

zsh_users: "{{ users }}"

dconf_settings:
  - name: Set CAPSLOCK as Ctrl and Disable ALTGR on UK keyboards
    key: /org/gnome/desktop/input-sources/xkb-options
    value: "['ctrl:nocaps', 'lv3:ralt_alt']"

deb_package_specs: []
rpm_package_specs: []
generic_package_specs: []

generic_packages:
  # Development tooling for GCC C/C++
  - autoconf
  - automake
  - gcc
  - llvm

  # Virtualization software
  - gnome-boxes
  
  # Stuff I wish was included by default
  - gnome-weather
  - gnome-clocks

  # System monitor
  - htop

  # CCache, Ninja, and Meson
  - ccache
  - meson
  - ninja-build

  # Introspection
  - strace
  - ltrace
  - valgrind

  # TAGs
  - cscope
  - ctags

  # Misc tools
  - git
  - curl
  - indent
  - jq
  - libtool
  - tmux

  # Documentation
  - pandoc

  # Lint / Correctness
  - yamllint

  # Neovim / Tmux system clipboard support
  - xclip

  # PyPI upload tool
  - twine

  # Spell checker
  - aspell
  - aspell-en

  - neovim


deb_packages:
  # C++ Compiler
  - g++
  - clangd

  # Icecream on Ubuntu / Debian
  - icecc
  - icecc-monitor

  # Some standard terminfos
  - ncurses-term

  # Misc tools
  - ansible-lint
  - libtool-bin
  - linux-tools-common  # this provides the perf command
  - silversearcher-ag
  - mu4e
  - python3-proselint

  - python3-psutil

  # MongoDB Development Libraries
  - flex
  - libssl-dev
  - libsnmp-dev
  - libsasl2-dev
  - libcurl4-openssl-dev
  - libldap-dev
  - libkrb5-dev

  # Python
  - python3-all
  - python3-all-dev
  - python3-pip
  - python3-venv
  - pylint

  # Ruby
  - ruby-dev

  # My preferred font
  - fonts-firacode

  # Emacs development libraries
  - libgtk-3-dev
  - libgif-dev 
  - libtiff-dev 
  - libjpeg-dev
  - libxpm-dev 
  - gnutls-dev
  - libncurses-dev
  - libjansson-dev
  - texinfo

  # Maildir Utils libs
  - libgmime-3.0-dev
  - libxapian-dev

  # MPB dev libraries
  - libxml2-dev
  - libxslt1-dev
  - libpq-dev
  - python2-dev
  - mysql-client

  # Ensure netstat is installed
  - net-tools
