---
- hosts: workstation
  pre_tasks:
    - name: Include variables depending on OS family
      include_vars: "{{ item }}"
      with_first_found:
        - files: ["{{ ansible_facts['os_family'] }}.yml"]
          skip: true
          errors: ignore
  roles:
    - chasinglogic.os_packages
    - chasinglogic.ansible_users
    - chasinglogic.linux_power_saving
    - chasinglogic.dconf_settings
    - zsh
  tasks:
    - name: Install python language server
      become: true
      become_user: root
      pip:
        executable: pip3
        name:
          - python-language-server[all]
    - name: Add docker signing key
      become: true
      become_user: root
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/trusted.gpg.d/docker.gpg
    - name: Add docker repository
      become: true
      become_user: root
      apt_repository:
        repo: |
          deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present
        filename: docker
    - name: Install docker
      become: true
      become_user: root
      apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
